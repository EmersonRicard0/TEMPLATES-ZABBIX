zabbix_export:
  version: '7.4'
  template_groups:
  - uuid: a7ee5cf2906b45988bda0a42a82a68b1
    name: Templates
  templates:
  - uuid: 239e65e43de04bee85db8049ef4976d5
    template: Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo
    name: Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo
    groups:
    - name: Templates
    discovery_rules:
    - uuid: 7a7381b6972a491ab6d9dcc47b268c87
      name: Network interfaces discovery portas fisicas
      type: SNMP_AGENT
      snmp_oid: discovery[{#IFOPERSTATUS},1.3.6.1.2.1.2.2.1.8,{#IFADMINSTATUS},1.3.6.1.2.1.2.2.1.7,{#IFALIAS},1.3.6.1.2.1.31.1.1.1.18,{#IFNAME},1.3.6.1.2.1.31.1.1.1.1,{#IFDESCR},1.3.6.1.2.1.2.2.1.2,{#IFTYPE},1.3.6.1.2.1.2.2.1.3]
      key: net.if.discovery.portas.fisicas
      delay: 1h
      filter:
        evaltype: AND
        conditions:
        - macro: '{#IFTYPE}'
          value: '6'
      lifetime: 30d
      enabled_lifetime_type: DISABLE_NEVER
      description: Discovering interfaces from IF-MIB.
      item_prototypes:
      - uuid: 33d263e63a664e31af3a5797cadb834b
        name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets discarded'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.2.2.1.13.{#SNMPINDEX}
        key: net.if.in.discards[ifInDiscards.{#SNMPINDEX}]
        delay: 3m
        history: 7d
        description: 'MIB: IF-MIB. Descricao simplificada para evitar erro de YAML no import do Zabbix.'
        preprocessing:
        - type: CHANGE_PER_SECOND
        tags:
        - tag: Network Interfaces Discarded
      - uuid: a99b6d0e6f574a06b5fa5280f2a0fd68
        name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets with errors'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.2.2.1.14.{#SNMPINDEX}
        key: net.if.in.errors[ifInErrors.{#SNMPINDEX}]
        delay: 3m
        history: 7d
        description: 'MIB: IF-MIB. Descricao simplificada para evitar erro de YAML no import do Zabbix.'
        preprocessing:
        - type: CHANGE_PER_SECOND
        tags:
        - tag: Network Interfaces Packets Erros
      - uuid: 9409c8b537e24c9499c7ebbdd9264cb7
        name: 'Interface {#IFNAME}({#IFALIAS}): Bits received'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.31.1.1.1.6.{#SNMPINDEX}
        key: net.if.in[ifHCInOctets.{#SNMPINDEX}]
        delay: 3m
        history: 7d
        units: bps
        description: 'MIB: IF-MIB. Descricao simplificada para evitar erro de YAML no import do Zabbix.'
        preprocessing:
        - type: CHANGE_PER_SECOND
        - type: MULTIPLIER
          parameters:
          - '8'
        tags:
        - tag: Network Interfaces Bits
      - uuid: 759ed52c345540adb01e1e26f0c0bd91
        name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets discarded'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.2.2.1.19.{#SNMPINDEX}
        key: net.if.out.discards[ifOutDiscards.{#SNMPINDEX}]
        delay: 3m
        history: 7d
        description: 'MIB: IF-MIB. Descricao simplificada para evitar erro de YAML no import do Zabbix.'
        preprocessing:
        - type: CHANGE_PER_SECOND
        tags:
        - tag: Network Interfaces Discarded
      - uuid: 26c508018bfe426eabbb48c36334afd5
        name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets with errors'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.2.2.1.20.{#SNMPINDEX}
        key: net.if.out.errors[ifOutErrors.{#SNMPINDEX}]
        delay: 3m
        history: 7d
        description: 'MIB: IF-MIB. Descricao simplificada para evitar erro de YAML no import do Zabbix.'
        preprocessing:
        - type: CHANGE_PER_SECOND
        tags:
        - tag: Network Interfaces Packets Erros
      - uuid: ff9711eef4284b32bacabb2b953f16b6
        name: 'Interface {#IFNAME}({#IFALIAS}): Bits sent'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.31.1.1.1.10.{#SNMPINDEX}
        key: net.if.out[ifHCOutOctets.{#SNMPINDEX}]
        delay: 3m
        history: 7d
        units: bps
        description: 'MIB: IF-MIB. Descricao simplificada para evitar erro de YAML no import do Zabbix.'
        preprocessing:
        - type: CHANGE_PER_SECOND
        - type: MULTIPLIER
          parameters:
          - '8'
        tags:
        - tag: Network Interfaces Bits
      - uuid: 943039b36d4944009e5ac17399d4e765
        name: 'Interface {#IFNAME}({#IFALIAS}): Speed'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.31.1.1.1.15.{#SNMPINDEX}
        key: net.if.speed[ifHighSpeed.{#SNMPINDEX}]
        delay: 5m
        history: 7d
        trends: '0'
        units: bps
        description: 'MIB: IF-MIB. Descricao simplificada para evitar erro de YAML no import do Zabbix.'
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '1000000'
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1h
        tags:
        - tag: Network Interfaces Speed
      - uuid: 86a3d1b05bb74eb1ab55383942fbe7ac
        name: 'Interface {#IFNAME}({#IFALIAS}): Operational status'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}
        key: net.if.status[ifOperStatus.{#SNMPINDEX}]
        history: 7d
        trends: '0'
        description: 'MIB: IF-MIB. Descricao simplificada para evitar erro de YAML no import do Zabbix.'
        valuemap:
          name: IF-MIB::ifOperStatus
        tags:
        - tag: Network Interfaces Status
        trigger_prototypes:
        - uuid: fecf113a148e4b78b7455a49c4197a07
          expression: '{$IFCONTROL:"{#IFNAME}"}=1 and (last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))=1)'
          recovery_mode: RECOVERY_EXPRESSION
          recovery_expression: last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0
          name: 'Interface {#IFNAME}({#IFALIAS}): Link down'
          opdata: 'Current state: {ITEM.LASTVALUE1}'
          priority: AVERAGE
          description: 'This trigger expression works as follows: 1. Can be triggered if operations status is down. 2. {$IFCONTROL:"{#IFNAME}"}=1 - user can redefine Context macro to value - 0. That marks this interface as not important. No new trigger will be fired if this interface is down. 3. {TEMPLATE_NAME:METRIC.diff()}=1) - trigger fires only if operational status was up(1) sometime before. (So, do not fire ''ethernal off'' interfaces.) WARNING: if closed manually - won''t fire again on next poll, because of .diff.'
      - uuid: 64e822656b07428d899655d260095301
        name: 'Interface {#IFNAME}({#IFALIAS}): Interface type'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.2.1.2.2.1.3.{#SNMPINDEX}
        key: net.if.type[ifType.{#SNMPINDEX}]
        delay: 1h
        history: 7d
        trends: '0'
        description: 'MIB: IF-MIB. Descricao simplificada para evitar erro de YAML no import do Zabbix.'
        valuemap:
          name: IF-MIB::ifType
        preprocessing:
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1d
        tags:
        - tag: Network Interfaces Type
      trigger_prototypes:
      - uuid: 3dcdbeab02354b7394312280abdef78f
        expression: 'change(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.speed[ifHighSpeed.{#SNMPINDEX}])<0 and last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0

          and (

          last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.type[ifType.{#SNMPINDEX}])=6 or

          last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.type[ifType.{#SNMPINDEX}])=7 or

          last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.type[ifType.{#SNMPINDEX}])=11 or

          last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.type[ifType.{#SNMPINDEX}])=62 or

          last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.type[ifType.{#SNMPINDEX}])=69 or

          last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.type[ifType.{#SNMPINDEX}])=117

          )

          and

          (last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2)

          '
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: '(change(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0 and last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.speed[ifHighSpeed.{#SNMPINDEX}],#2)>0) or

          (last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}])=2)

          '
        name: 'Interface {#IFNAME}({#IFALIAS}): Ethernet has changed to lower speed than it was before'
        opdata: 'Current reported speed: {ITEM.LASTVALUE1}'
        priority: INFO
        description: This Ethernet connection has transitioned down from its known maximum speed. This might be a sign of autonegotiation issues. Ack to close.
        dependencies:
        - name: 'Interface {#IFNAME}({#IFALIAS}): Link down'
          expression: '{$IFCONTROL:"{#IFNAME}"}=1 and (last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))=1)'
          recovery_expression: last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0
      - uuid: cdaf5340b5c943c08bd4a7e2beae8a3b
        expression: '(avg(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.in[ifHCInOctets.{#SNMPINDEX}],15m)>({$IF.UTIL.MAX:"{#IFNAME}"}/100)*last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.speed[ifHighSpeed.{#SNMPINDEX}]) or

          avg(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.out[ifHCOutOctets.{#SNMPINDEX}],15m)>({$IF.UTIL.MAX:"{#IFNAME}"}/100)*last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.speed[ifHighSpeed.{#SNMPINDEX}])) and

          last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0

          '
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: 'avg(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.in[ifHCInOctets.{#SNMPINDEX}],15m)<(({$IF.UTIL.MAX:"{#IFNAME}"}-3)/100)*last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.speed[ifHighSpeed.{#SNMPINDEX}]) and

          avg(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.out[ifHCOutOctets.{#SNMPINDEX}],15m)<(({$IF.UTIL.MAX:"{#IFNAME}"}-3)/100)*last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.speed[ifHighSpeed.{#SNMPINDEX}])

          '
        name: 'Interface {#IFNAME}({#IFALIAS}): High bandwidth usage (>{$IF.UTIL.MAX:"{#IFNAME}"}%)'
        opdata: 'In: {ITEM.LASTVALUE1}, out: {ITEM.LASTVALUE3}, speed: {ITEM.LASTVALUE2}'
        priority: WARNING
        description: The network interface utilization is close to its estimated maximum bandwidth.
        manual_close: 'YES'
        dependencies:
        - name: 'Interface {#IFNAME}({#IFALIAS}): Link down'
          expression: '{$IFCONTROL:"{#IFNAME}"}=1 and (last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))=1)'
          recovery_expression: last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0
      - uuid: 6bd7256e32f94d76a8e44dd5c5fac4ac
        expression: 'min(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)>{$IF.ERRORS.WARN:"{#IFNAME}"}

          or min(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)>{$IF.ERRORS.WARN:"{#IFNAME}"}

          '
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: 'max(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)<{$IF.ERRORS.WARN:"{#IFNAME}"}*0.8

          and max(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)<{$IF.ERRORS.WARN:"{#IFNAME}"}*0.8

          '
        name: 'Interface {#IFNAME}({#IFALIAS}): High error rate (>{$IF.ERRORS.WARN:"{#IFNAME}"} for 5m)'
        opdata: 'errors in: {ITEM.LASTVALUE1}, errors out: {ITEM.LASTVALUE2}'
        priority: WARNING
        description: Recovers when below 80% of {$IF.ERRORS.WARN:"{#IFNAME}"} threshold
        dependencies:
        - name: 'Interface {#IFNAME}({#IFALIAS}): Link down'
          expression: '{$IFCONTROL:"{#IFNAME}"}=1 and (last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))=1)'
          recovery_expression: last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0
      - uuid: d1c3a8cf4e7e4770974a87a2b6ba62b8
        expression: '(

          (

          ((avg(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.in[ifHCInOctets.{#SNMPINDEX}],3h)+0.1)

          -

          last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.in[ifHCInOctets.{#SNMPINDEX}]))

          /

          (avg(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.in[ifHCInOctets.{#SNMPINDEX}],3h)+0.1)*100>=40

          )


          or


          (

          ((avg(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.out[ifHCOutOctets.{#SNMPINDEX}],3h)+0.1)

          -

          last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.out[ifHCOutOctets.{#SNMPINDEX}]))

          /

          (avg(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.out[ifHCOutOctets.{#SNMPINDEX}],3h)+0.1)*100>=40

          )


          )


          and


          (

          max(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.in[ifHCInOctets.{#SNMPINDEX}],#3)<>0

          and

          change(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.in[ifHCInOctets.{#SNMPINDEX}])<=-10000000

          and

          max(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.out[ifHCOutOctets.{#SNMPINDEX}],#3)<>0

          and

          change(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.out[ifHCOutOctets.{#SNMPINDEX}])<=-10000000

          )


          and

          last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2

          '
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: '(

          ((avg(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.in[ifHCInOctets.{#SNMPINDEX}],3h)+0.1)

          -

          last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.in[ifHCInOctets.{#SNMPINDEX}]))

          /

          (avg(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.in[ifHCInOctets.{#SNMPINDEX}],3h)+0.1)*100<=40

          and

          last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.in[ifHCInOctets.{#SNMPINDEX}])>=

          avg(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.in[ifHCInOctets.{#SNMPINDEX}],12h)

          )


          or


          (

          ((avg(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.out[ifHCOutOctets.{#SNMPINDEX}],3h)+0.1)

          -

          last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.out[ifHCOutOctets.{#SNMPINDEX}]))

          /

          (avg(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.out[ifHCOutOctets.{#SNMPINDEX}],3h)+0.1)*100<=40

          and

          last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.out[ifHCOutOctets.{#SNMPINDEX}])>=

          avg(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.out[ifHCOutOctets.{#SNMPINDEX}],12h)

          )


          or

          last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}])=2

          '
        name: 'Possivel Queda de Trafego (-40%): Interface {#IFNAME}({#IFALIAS})'
        opdata: 'In: {ITEM.LASTVALUE1}, out: {ITEM.LASTVALUE3}'
        priority: AVERAGE
        description: Detecta possível baixa brusca de tráfego em porta física. Dispara quando a entrada ou saída cai 40% ou mais em relação à média das últimas 3 horas, com queda mínima aproximada de 10 Mbps e tráfego existente nos últimos ciclos. A dependência com Link down evita duplicidade quando a porta estiver realmente down.
        manual_close: 'YES'
        dependencies:
        - name: 'Interface {#IFNAME}({#IFALIAS}): Link down'
          expression: '{$IFCONTROL:"{#IFNAME}"}=1 and (last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))=1)'
          recovery_expression: last(/Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0
      graph_prototypes:
      - uuid: 709ce2804c86442093cbec588ed2ee48
        name: 'Interface {#IFNAME}({#IFALIAS}): Network traffic'
        graph_items:
        - drawtype: GRADIENT_LINE
          color: 1A7C11
          item:
            host: Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo
            key: net.if.in[ifHCInOctets.{#SNMPINDEX}]
        - sortorder: '1'
          drawtype: BOLD_LINE
          color: 2774A4
          item:
            host: Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo
            key: net.if.out[ifHCOutOctets.{#SNMPINDEX}]
        - sortorder: '2'
          color: F63100
          yaxisside: RIGHT
          item:
            host: Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo
            key: net.if.out.errors[ifOutErrors.{#SNMPINDEX}]
        - sortorder: '3'
          color: A54F10
          yaxisside: RIGHT
          item:
            host: Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo
            key: net.if.in.errors[ifInErrors.{#SNMPINDEX}]
        - sortorder: '4'
          color: FC6EA3
          yaxisside: RIGHT
          item:
            host: Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo
            key: net.if.out.discards[ifOutDiscards.{#SNMPINDEX}]
        - sortorder: '5'
          color: 6C59DC
          yaxisside: RIGHT
          item:
            host: Template Module Interfaces SNMP - Portas Fisicas - emerson.ricardo
            key: net.if.in.discards[ifInDiscards.{#SNMPINDEX}]
    - uuid: cb168ada21b840bd9ca01ac8d4df9f24
      name: Network Optical Modules Single Lane discovery - Huawei thresholds numeric only
      type: SNMP_AGENT
      snmp_oid: discovery[{#IFNAME},1.3.6.1.2.1.47.1.1.1.1.7,{#SFP_SERIAL},1.3.6.1.4.1.2011.5.25.31.1.1.3.1.4,{#SFP_VENDOR},1.3.6.1.4.1.2011.5.25.31.1.1.3.1.24,{#SFP_MODEL},1.3.6.1.4.1.2011.5.25.31.1.1.3.1.25,{#RX_RAW},1.3.6.1.4.1.2011.5.25.31.1.1.3.1.32,{#TX_RAW},1.3.6.1.4.1.2011.5.25.31.1.1.3.1.33]
      key: hw.optical.discovery.single.lane
      delay: 1h
      lifetime: 30d
      enabled_lifetime_type: DISABLE_NEVER
      description: 'Descobre módulos ópticos Huawei pela HUAWEI-ENTITY-EXTENT-MIB e coleta RX/TX Power com os limites reais do transceiver.


        Filtro ajustado para descobrir somente interfaces físicas ópticas e ignorar Board/Card/POWER/PWR/FAN, evitando erro de preprocessing em valores string.


        Ajuste: adicionadas macros {#RX_RAW}/{#TX_RAW} no LLD e filtro numerico para nao criar itens em portas sem DOM/DDM ou valores string.


        Ajuste: removidos itens, triggers e gráficos de Voltage para evitar falsos positivos.'
      item_prototypes:
      - uuid: 0d31b92beed24c06ad27a4d2997af723
        name: 'Optical Module Interface {#IFNAME}: RxPower'
        type: SNMP_AGENT
        snmp_oid: 1.3.6.1.4.1.2011.5.25.31.1.1.3.1.32.{#SNMPINDEX}
        key: hwEntityOpticalLaneRxPower[{#IFNAME}]
        delay: 5m
        history: 10d
        trends: 365d
        value_type: FLOAT
        units: dBm
        description: RX optical power atual do módulo Huawei. Valor bruto SNMP em centésimos de dBm.
        preprocessing:
        - type: MULTIPLIER
          parameters:
          - '0.01'
        tags:
        - tag: Application
          value: Network interfaces Sinal
